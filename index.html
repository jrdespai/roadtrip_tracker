<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US Road Trip Explorer</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Leaflet.markercluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    :root {
      --header-height: 3.25rem;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .leaflet-container {
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>

  <style>
    /* After Leaflet CSS so these rules win */
    #map .leaflet-top.leaflet-left {
      top: calc(var(--header-height) + 0.5rem);
    }
  </style>
</head>
<body class="bg-gray-900">

  <!-- Floating header -->
  <header id="app-header" class="fixed top-0 left-0 right-0 z-[1000] flex items-center justify-center px-4
                 bg-gray-900/70 backdrop-blur-sm border-b border-white/10 pointer-events-none"
          style="height: var(--header-height);">
    <h1 class="text-lg font-semibold text-white tracking-wide drop-shadow-sm">
      US Road Trip Explorer
    </h1>
  </header>

  <div id="map"></div>

  <script>
    const map = L.map('map', {
      center: [39.8283, -98.5795],
      zoom: 4,
      zoomControl: true,
      touchZoom: true,
      scrollWheelZoom: true,
      boxZoom: false,
      keyboard: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);

    const markerClusterGroup = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 50,
      spiderfyOnMaxZoom: true,
      disableClusteringAtZoom: 16
    });

    map.addLayer(markerClusterGroup);

    function positionControlsBelowHeader() {
      const gap = 8;
      const top = document.getElementById('app-header').offsetHeight + gap;
      document.querySelectorAll('#map .leaflet-top.leaflet-left').forEach((el) => {
        el.style.top = `${top}px`;
      });
    }

    map.whenReady(positionControlsBelowHeader);
    window.addEventListener('resize', positionControlsBelowHeader);
  </script>
</body>
</html>
