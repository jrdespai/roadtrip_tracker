<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US Road Trip Explorer</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>

  <!-- Leaflet.markercluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <style>
    :root {
      --header-height: 3.25rem;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .leaflet-container {
      font-family: system-ui, -apple-system, sans-serif;
    }

    .location-marker {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.45);
    }

    .location-marker--temple {
      background: #f5c842;
    }

    .location-marker--university {
      background: #1e3a8a;
    }
  </style>

  <style>
    /* After Leaflet CSS so these rules win */
    #map .leaflet-top.leaflet-left {
      top: calc(var(--header-height) + 0.5rem);
    }
  </style>
</head>
<body class="bg-gray-900">

  <!-- Floating header -->
  <header id="app-header" class="fixed top-0 left-0 right-0 z-[1000] flex items-center justify-center px-4
                 bg-gray-900/70 backdrop-blur-sm border-b border-white/10 pointer-events-none"
          style="height: var(--header-height);">
    <h1 class="text-lg font-semibold text-white tracking-wide drop-shadow-sm">
      US Road Trip Explorer
    </h1>
  </header>

  <div id="map"></div>

  <script>
    const KML_FILE = 'ChurchofJesusChristTemples (1).kml';
    const UNIVERSITIES_FILE = 'universities.json';

    const STATE_NAME_TO_ABBR = {
      Alabama: 'AL', Alaska: 'AK', Arizona: 'AZ', Arkansas: 'AR', California: 'CA',
      Colorado: 'CO', Connecticut: 'CT', Delaware: 'DE', 'District of Columbia': 'DC',
      Florida: 'FL', Georgia: 'GA', Hawaii: 'HI', Idaho: 'ID', Illinois: 'IL',
      Indiana: 'IN', Iowa: 'IA', Kansas: 'KS', Kentucky: 'KY', Louisiana: 'LA',
      Maine: 'ME', Maryland: 'MD', Massachusetts: 'MA', Michigan: 'MI', Minnesota: 'MN',
      Mississippi: 'MS', Missouri: 'MO', Montana: 'MT', Nebraska: 'NE', Nevada: 'NV',
      'New Hampshire': 'NH', 'New Jersey': 'NJ', 'New Mexico': 'NM', 'New York': 'NY',
      'North Carolina': 'NC', 'North Dakota': 'ND', Ohio: 'OH', Oklahoma: 'OK', Oregon: 'OR',
      Pennsylvania: 'PA', 'Rhode Island': 'RI', 'South Carolina': 'SC', 'South Dakota': 'SD',
      Tennessee: 'TN', Texas: 'TX', Utah: 'UT', Vermont: 'VT', Virginia: 'VA',
      Washington: 'WA', 'West Virginia': 'WV', Wisconsin: 'WI', Wyoming: 'WY'
    };

    const map = L.map('map', {
      center: [39.8283, -98.5795],
      zoom: 4,
      zoomControl: true,
      touchZoom: true,
      scrollWheelZoom: true,
      boxZoom: false,
      keyboard: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(map);

    const markerClusterGroup = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 50,
      spiderfyOnMaxZoom: true,
      disableClusteringAtZoom: 16
    });

    map.addLayer(markerClusterGroup);

    function positionControlsBelowHeader() {
      const gap = 8;
      const top = document.getElementById('app-header').offsetHeight + gap;
      document.querySelectorAll('#map .leaflet-top.leaflet-left').forEach((el) => {
        el.style.top = `${top}px`;
      });
    }

    map.whenReady(positionControlsBelowHeader);
    window.addEventListener('resize', positionControlsBelowHeader);

    function getElementsByLocalName(parent, localName) {
      return Array.from(parent.getElementsByTagName('*')).filter(
        (el) => el.localName === localName
      );
    }

    function getChildText(parent, localName) {
      const child = getElementsByLocalName(parent, localName)[0];
      return child ? child.textContent.trim() : '';
    }

    function stripHtml(html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      return doc.body.textContent || '';
    }

    function isWithinUsBounds(lat, lng) {
      return lat >= 18 && lat <= 72 && lng >= -180 && lng <= -60;
    }

    function parseCityStateFromDescription(description, name) {
      const lines = stripHtml(description)
        .split('\n')
        .map((line) => line.trim())
        .filter(Boolean);

      const usIndex = lines.findIndex((line) => /United States/i.test(line));
      if (usIndex > 0) {
        const cityStateLine = lines[usIndex - 1];
        const commaIndex = cityStateLine.lastIndexOf(',');
        if (commaIndex !== -1) {
          const city = cityStateLine.slice(0, commaIndex).trim();
          const stateName = cityStateLine.slice(commaIndex + 1).trim();
          const state = STATE_NAME_TO_ABBR[stateName] || stateName.slice(0, 2).toUpperCase();
          return { city, state };
        }
      }

      const nameMatch = name.match(/^(.+?)\s+(Alabama|Alaska|Arizona|Arkansas|California|Colorado|Connecticut|Delaware|Florida|Georgia|Hawaii|Idaho|Illinois|Indiana|Iowa|Kansas|Kentucky|Louisiana|Maine|Maryland|Massachusetts|Michigan|Minnesota|Mississippi|Missouri|Montana|Nebraska|Nevada|New Hampshire|New Jersey|New Mexico|New York|North Carolina|North Dakota|Ohio|Oklahoma|Oregon|Pennsylvania|Rhode Island|South Carolina|South Dakota|Tennessee|Texas|Utah|Vermont|Virginia|Washington|West Virginia|Wisconsin|Wyoming)\s+Temple$/i);

      if (nameMatch) {
        return {
          city: nameMatch[1].trim(),
          state: STATE_NAME_TO_ABBR[nameMatch[2]] || nameMatch[2].slice(0, 2).toUpperCase()
        };
      }

      return { city: 'Unknown', state: 'US' };
    }

    function parseTemplesFromKml(kmlText) {
      const xmlDoc = new DOMParser().parseFromString(kmlText, 'text/xml');
      const placemarks = getElementsByLocalName(xmlDoc, 'Placemark');
      const temples = [];

      placemarks.forEach((placemark, index) => {
        const name = getChildText(placemark, 'name');
        const description = getChildText(placemark, 'description');
        const coordinatesText = getChildText(
          getElementsByLocalName(placemark, 'Point')[0] || placemark,
          'coordinates'
        );

        if (!name || !coordinatesText) {
          return;
        }

        const [lngRaw, latRaw] = coordinatesText.split(',').map((part) => part.trim());
        const lng = parseFloat(lngRaw);
        const lat = parseFloat(latRaw);

        if (Number.isNaN(lat) || Number.isNaN(lng)) {
          return;
        }

        const isUnitedStates = /United States/i.test(description) || isWithinUsBounds(lat, lng);
        if (!isUnitedStates) {
          return;
        }

        const { city, state } = parseCityStateFromDescription(description, name);

        temples.push({
          id: `temple-${index}`,
          name,
          type: 'temple',
          city,
          state,
          lat,
          lng
        });
      });

      return temples;
    }

    function createLocationIcon(type) {
      const className = type === 'temple'
        ? 'location-marker location-marker--temple'
        : 'location-marker location-marker--university';

      return L.divIcon({
        className: '',
        html: `<div class="${className}"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
    }

    function addLocationsToMap(locations) {
      locations.forEach((location) => {
        const marker = L.marker([location.lat, location.lng], {
          icon: createLocationIcon(location.type),
          title: location.name
        });
        markerClusterGroup.addLayer(marker);
      });
    }

    async function loadLocations() {
      const [universitiesResponse, kmlResponse] = await Promise.all([
        fetch(UNIVERSITIES_FILE),
        fetch(KML_FILE)
      ]);

      if (!universitiesResponse.ok) {
        throw new Error(`Failed to load ${UNIVERSITIES_FILE}`);
      }
      if (!kmlResponse.ok) {
        throw new Error(`Failed to load ${KML_FILE}`);
      }

      const [universities, kmlText] = await Promise.all([
        universitiesResponse.json(),
        kmlResponse.text()
      ]);

      const temples = parseTemplesFromKml(kmlText);
      const allLocations = [...universities, ...temples];

      addLocationsToMap(allLocations);
      console.info(`Loaded ${temples.length} temples and ${universities.length} universities (${allLocations.length} total).`);
    }

    loadLocations().catch((error) => {
      console.error('Failed to load map data:', error);
    });
  </script>
</body>
</html>
